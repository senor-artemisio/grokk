name: Build Unsigned DMG

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-dmg:
    name: Build unsigned DMG
    runs-on: macos-latest
    outputs:
      dmg_path: ${{ steps.build.outputs.dmg_path }}
      dmg_name: ${{ steps.build.outputs.dmg_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned DMG
        id: build
        run: |
          set -euo pipefail
          chmod +x scripts/release-dmg.sh

          short_sha="${GITHUB_SHA::7}"
          dmg_path="$PWD/build/Grokk-unsigned-${short_sha}.dmg"

          DMG_PATH="$dmg_path" MIN_MACOS=14.0 ./scripts/release-dmg.sh

          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$dmg_path")" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.dmg_name }}
          path: ${{ steps.build.outputs.dmg_path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-dmg
    permissions:
      contents: write

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-dmg.outputs.dmg_name }}
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/${{ needs.build-dmg.outputs.dmg_name }}
          generate_release_notes: true
